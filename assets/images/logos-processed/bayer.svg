<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 200" width="500" height="200">
  <title>Bayer</title>
  <!-- Normalized monochrome white Bayer logo — cross circle emblem + wordmark -->
  <g fill="#FFFFFF">
    <!-- Bayer cross circle simplified -->
    <circle cx="100" cy="100" r="75" fill="none" stroke="#FFFFFF" stroke-width="7"/>
    <rect x="93" y="35" width="14" height="130" fill="#FFFFFF"/>
    <rect x="35" y="93" width="130" height="14" fill="#FFFFFF"/>
    <!-- Wordmark -->
    <text x="200" y="120" font-family="Arial, sans-serif" font-size="72" font-weight="700" letter-spacing="-2" fill="#FFFFFF">Bayer</text>
  </g>
</svg>
